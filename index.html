<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Masajes Naty</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Masajes Naty">
    <meta name="theme-color" content="#FFFFFF">

    <link rel="icon" type="image/png" href="https://i.postimg.cc/GhL4rqrB/Captura-de-pantalla-2026-06-10-132435.png">
    <link rel="apple-touch-icon" sizes="180x180" href="https://i.postimg.cc/GhL4rqrB/Captura-de-pantalla-2026-06-10-132435.png">
    <link rel="manifest" href="manifest.json">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #FFFFFF;
        }
    </style>
</head>
<body>

    <div id="app" style="width: 100%; height: 100%; overflow-y: auto;">
        <div style="display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; font-size: 1.2rem; color: #555;">
            Cargando Masajes Naty...
        </div>
    </div>

<script>
  const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbwXQWiVKWbMEs4j8yQZ__FlEkkxuNsbE1C6n8wYUvNHtEjDsWal-hCMN2CrgJIZqpOJ/exec";

  // Carga las vistas desde Google Apps Script de forma asíncrona
// Carga las vistas desde Google Apps Script de forma asíncrona
function cargarVistaPWA(vistaNom = "") {
    const contenedor = document.getElementById("app");
    
    // Generar un nombre de función global temporal para recibir los datos
    const callbackName = "callbackPWA_" + Math.floor(Math.random() * 100000);
    
    let urlDestino = `${URL_SCRIPT}?output=api&callback=${callbackName}`;
    if (vistaNom) {
        urlDestino += `&v=${vistaNom}`;
    }

    // Definir qué hacer cuando Google responda
    window[callbackName] = function(htmlContenido) {
       contenedor.innerHTML = htmlContenido;
       
       // Activar y ejecuta los scripts internos del HTML inyectado
       const scripts = contenedor.querySelectorAll("script");
       scripts.forEach(oldScript => {
           const newScript = document.createElement("script");
           Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
           newScript.appendChild(document.createTextNode(oldScript.innerHTML));
           oldScript.parentNode.replaceChild(newScript, oldScript);
       });
       
       // Limpieza de memoria
       delete window[callbackName];
       document.getElementById(callbackName)?.remove();
    };

    // Inyectar el tag script para forzar al navegador a saltarse CORS
    const scriptTag = document.createElement("script");
    scriptTag.id = callbackName;
    scriptTag.src = urlDestino;
    scriptTag.onerror = function() {
       console.error("Error al cargar la interfaz vía Script Tag.");
       contenedor.innerHTML = `
       <div style="padding:20px; text-align:center; font-family:sans-serif; color:red;">
          <h3>Error de conexión</h3>
          <p>No se pudo sincronizar la aplicación. Verifica tu conexión o intenta recargar.</p>
       </div>`;
    };
    
    document.body.appendChild(scriptTag);
  }
  // Ejecución inicial al abrir la PWA
  window.addEventListener("DOMContentLoaded", () => {
      cargarVistaPWA("");
  });

  // Registro del Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
</body>
</html>
