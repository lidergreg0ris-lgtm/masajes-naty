<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Masajes Naty</title>
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Masajes Naty">
    <meta name="theme-color" content="#FFFFFF">

    <link rel="icon" type="image/png" href="https://i.postimg.cc/GhL4rqrB/Captura-de-pantalla-2026-06-10-132435.png">
    <link rel="apple-touch-icon" sizes="180x180" href="https://i.postimg.cc/GhL4rqrB/Captura-de-pantalla-2026-06-10-132435.png">
    <link rel="manifest" href="manifest.json">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #FFFFFF;
        }
    </style>
</head>
<body>

    <div id="app" style="width: 100%; height: 100%; overflow-y: auto;">
        <div style="display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; font-size: 1.2rem; color: #555;">
            Cargando Masajes Naty...
        </div>
    </div>

<script>
  const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbwXQWiVKWbMEs4j8yQZ__FlEkkxuNsbE1C6n8wYUvNHtEjDsWal-hCMN2CrgJIZqpOJ/exec";

  function cargarVistaPWA(vistaNom = "") {
    const contenedor = document.getElementById("app");
    let urlDestino = `${URL_SCRIPT}?output=api`;
    if (vistaNom) {
        urlDestino += `&v=${vistaNom}`;
    }

    // El modo no-cors fuerza la omisión de restricciones estrictas del navegador
    fetch(urlDestino, {
        method: 'GET',
        mode: 'cors',
        redirect: 'follow'
    })
      .then(response => {
         if (!response.ok) throw new Error("Error de red.");
         return response.text();
      })
      .then(htmlContenido => {
         contenedor.innerHTML = htmlContenido;
         
         // Re-ejecutar scripts inyectados
         const scripts = contenedor.querySelectorAll("script");
         scripts.forEach(oldScript => {
             const newScript = document.createElement("script");
             Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
             newScript.appendChild(document.createTextNode(oldScript.innerHTML));
             oldScript.parentNode.replaceChild(newScript, oldScript);
         });
      })
      .catch(error => {
         console.error("Error al cargar la interfaz:", error);
         contenedor.innerHTML = `
         <div style="padding:20px; text-align:center; font-family:sans-serif; color:red;">
            <h3>Error de conexión</h3>
            <p>No se pudo sincronizar la aplicación. Verifica tu conexión o intenta recargar.</p>
         </div>`;
      });
  }

  document.addEventListener("click", function(e) {
      const link = e.target.closest("a");
      if (link && link.href.includes(URL_SCRIPT)) {
          e.preventDefault();
          const urlObj = new URL(link.href);
          const vistaParam = urlObj.searchParams.get("v");
          cargarVistaPWA(vistaParam);
      }
  });

  window.addEventListener("DOMContentLoaded", () => {
      cargarVistaPWA("");
  });

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>
</body>
</html>
